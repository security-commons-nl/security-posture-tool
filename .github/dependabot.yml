version: 2
updates:
  # Python dependencies in v0.1/
  - package-ecosystem: "pip"
    directory: "/v0.1"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"

  # github-actions ecosysteem weggelaten: deze repo heeft (nog) geen
  # .github/workflows/-map, dus dependabot had niets om bij te werken
  # en genereerde spurious 'failure' runs. Aanzetten zodra er een workflow
  # wordt toegevoegd.
